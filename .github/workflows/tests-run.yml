name: Run tests with Selenium Grid

# for uploading reports
#permissions:
#  contents: write

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to use (chrome, firefox, edge)'
        required: true
        default: 'firefox'
      threads:
        description: 'Number of parallel browser nodes to run'
        required: true
        default: '2'
      tags:
        description: 'Test tag to include (overrides default)'
        required: true
#TODO: update
#        default: 'regression'
        default: 'current'
      image-tag:
        description: 'Tag of images to pull from ghcr'
        required: true
        default: 'latest'
  push:
    branches:
      - feature/*

jobs:
  prepare:
    name: Prepare IMAGE_TAG
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Determine IMAGE_TAG
        id: set_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs['image-tag'] }}" ]; then
            echo "image_tag=${{ github.event.inputs['image-tag'] }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          else
            ref="${GITHUB_REF#refs/heads/}"
            ref="${ref//\//-}"
            echo "image_tag=snapshot-${ref}" >> $GITHUB_OUTPUT
          fi

  run-tests:
    name: Bring up grid, run Gradle tests, collect reports
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Use input if available, otherwise fallback
      BROWSER: ${{ github.event.inputs.browser || 'firefox' }}
      THREADS: ${{ github.event.inputs.threads || 2 }}
      TAGS: ${{ github.event.inputs.tags || 'regression' }}
#      IMAGE_TAG: ${{ github.event.inputs.image-tag || 'snapshot' }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Docker Compose
        run: |
          sudo apt-get update -y
          sudo apt-get install -y docker-compose

      - name: Prepare Downloads dir
        run: |
          mkdir -p Downloads
          chmod a+w Downloads

#should be rewritten
#      - name: Generate docker-compose.override.yml for GHCR images
#        run: |
#          cat > docker-compose.override.yml <<EOF
#          version: '3'
#          services:
#            selenium-hub:
#              image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-hub:${{ env.IMAGE_TAG }}
#            selenium-chrome:
#              image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-chrome:${{ env.IMAGE_TAG }}
#            selenium-firefox:
#              image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-firefox:${{ env.IMAGE_TAG }}
#            selenium-edge:
#              image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-edge:${{ env.IMAGE_TAG }}
#          EOF

      - name: Start Selenium Grid
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker network create selenium-grid-network || true
          docker-compose -f docker-compose-gh.yml up --scale selenium-${{ env.BROWSER }}=${{ env.THREADS }} -d

      - name: Show running containers
        run: docker ps --format "{{.Names}} {{.Image}}"

      - name: Run Gradle tests
        env:
          DOWNLOADS_FOLDER: Downloads
        run: |
          chmod +x gradlew
          ./gradlew -DuseGrid=true -Dbrowser=${{ env.BROWSER }} -Dthreads=${{ env.THREADS}} -DincludeTags=${{ env.TAGS }} -Ddownloads=$DOWNLOADS_FOLDER clean test allureReport || true

      - name: Collect container logs
        run: |
          mkdir -p logs
          docker ps -a --format "{{.Names}}" | while read c; do docker logs "$c" > "logs/$c.log" || true; done || true

      - name: Tear down
        run: |
          docker-compose down || true

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/reports/allure-report/allureReport
          destination_dir: reports/${{ github.ref_name }}/${{ github.run_id }}

      - name: Prepare public artifacts
        run: |
          mkdir -p public/Downloads
          mkdir -p public/allureReport
          if [ -d build/reports/allure-report/allureReport ]; then cp -r build/reports/allure-report/allureReport/* public/allureReport/ || true; fi
          if [ -d Downloads ]; then cp -r Downloads/* public/Downloads/ || true; fi
          tar -czf public-archives.tar.gz public || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-artifacts
          path: public-archives.tar.gz
          retention-days: 3

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: logs
          retention-days: 3
