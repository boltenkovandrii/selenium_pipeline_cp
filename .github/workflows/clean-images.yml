name: Clean old container images

on:
  workflow_dispatch:
    inputs:
      min_versions_to_keep:
        description: 'Minimum versions to keep per package (numeric)'
        required: false
        default: '5'
  schedule:
    - cron: '0 3 * * 0' # Weekly on Sunday at 03:00 UTC
#    - cron: '0 14 * * *' # Test

jobs:
  cleanup:
    name: cleanup old images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
      MIN_KEEP: ${{ github.event.inputs.min_versions_to_keep  || '5' }} # default value for cron runs
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Delete old package versions
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          packages=(hub chrome firefox edge)
          for p in "${packages[@]}"; do
            pkg="${REPO}-${p}"
            api_owner=orgs
            # try orgs first, then users
            if ! gh api -H "Accept: application/vnd.github+json" "/orgs/${OWNER}/packages/container/${pkg}/versions?per_page=100" > /tmp/out.$$ 2>/dev/null; then
              api_owner=users
              if ! gh api -H "Accept: application/vnd.github+json" "/users/${OWNER}/packages/container/${pkg}/versions?per_page=100" > /tmp/out.$$ 2>/dev/null; then
                echo "${pkg}: not found or inaccessible"
                continue
              fi
            fi
            out=$(cat /tmp/out.$$)
            # select untagged versions, sort newest first, keep MIN_KEEP newest, delete the rest
            ids_to_delete=$(echo "${out}" | jq -r '.[] | select((.metadata.container.tags|length)==0) | "\(.created_at) \(.id)"' | sort -r | awk -v k=${MIN_KEEP} 'NR>k{print $2}')
            if [ -z "${ids_to_delete}" ]; then
              echo "${pkg}: nothing to delete"
              continue
            fi
            for id in ${ids_to_delete}; do
              echo "Deleting ${pkg} version ${id}"
              if [ "${api_owner}" = "orgs" ]; then
                gh api -X DELETE "/orgs/${OWNER}/packages/container/${pkg}/versions/${id}" || echo "delete failed for ${id}"
              else
                gh api -X DELETE "/users/${OWNER}/packages/container/${pkg}/versions/${id}" || echo "delete failed for ${id}"
              fi
            done
          done

      - name: Summarize remaining package versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          echo "## Cleanup summary" >> "$GITHUB_STEP_SUMMARY"
          
          packages=(hub chrome firefox edge)
          
          for p in "${packages[@]}"; do
            pkg="${REPO}-${p}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### ${pkg}" >> "$GITHUB_STEP_SUMMARY"
          
            api_owner="orgs"
          
            if ! out=$(gh api --paginate "/orgs/${OWNER}/packages/container/${pkg}/versions" 2>/dev/null); then
              api_owner="users"
              if ! out=$(gh api --paginate "/users/${OWNER}/packages/container/${pkg}/versions" 2>/dev/null); then
                echo "- not found or inaccessible" >> "$GITHUB_STEP_SUMMARY"
                continue
              fi
            fi
          
            count=$(echo "$out" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "- no versions" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
          
            echo "$out" | jq -r '
              .[]
              | "- id:\(.id) | tags:\(.metadata.container.tags | join(","))"
            ' >> "$GITHUB_STEP_SUMMARY"
          done

