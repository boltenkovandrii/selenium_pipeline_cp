name: Build and push Docker images

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Tag to apply to built images'
        required: true
        default: 'latest'
  #TODO: update
  push:
    branches:
      - feature/*

env:
  IMAGE_TAG: ${{
    inputs.image-tag ||
    (github.ref_name == 'main' && 'latest') ||
    format('snapshot-{0}', replace(github.ref_name, '/', '-'))
}}

permissions:
  contents: read
  packages: write

jobs:
  build-runner:
    name: Build runner image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push runner
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/Dockerfile_runner
          push: true
#          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner:${{ github.event.inputs['image-tag'] }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner:${{ env.IMAGE_TAG }}

  build-hub:
