services:
  selenium-hub:
    image: $CI_REGISTRY_IMAGE/hub:4.23.1
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - selenium-grid-network

  selenium-edge:
    image: $CI_REGISTRY_IMAGE/edge:127.0
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0

  selenium-chrome:
    image: $CI_REGISTRY_IMAGE/chrome:127.0
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0

  selenium-firefox:
    image: $CI_REGISTRY_IMAGE/firefox:129.0
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0


networks:
  selenium-grid-network:
    driver: bridge