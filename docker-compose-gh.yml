services:
  selenium-hub:
    image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-hub:${{ env.IMAGE_TAG }}
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - selenium-grid-network

  selenium-edge:
    image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-edge:${{ env.IMAGE_TAG }}
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0

  selenium-chrome:
    image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-chrome:${{ env.IMAGE_TAG }}
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0

  selenium-firefox:
    image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-firefox:${{ env.IMAGE_TAG }}
    shm_size: 2g
    volumes:
      - /dev/shm:/dev/shm
      - $DOWNLOADS_FOLDER:/home/seluser/Downloads
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - selenium-grid-network
    depends_on:
      - selenium-hub
    scale: 0


networks:
  selenium-grid-network:
    driver: bridge